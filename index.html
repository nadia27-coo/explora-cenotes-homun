<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<title>Explora Cenotes Homún</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Poppins', sans-serif;
}

/* HERO ESTILO CANVA */
.hero {
    height:100vh;
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                url('cenote1.jpeg') center/cover no-repeat;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding-left:10%;
}

/* NAV */
nav {
    position:absolute;
    top:20px;
    right:50px;
}

nav a {
    color:white;
    margin-left:20px;
    text-decoration:none;
}

/* TITULO GRANDE */
.hero h1 {
    font-size:80px;
    font-weight:800;
    line-height:1;
}

/* TEXTO */
.hero p {
    margin:20px 0;
    max-width:500px;
}

/* BOTON */
.btn {
    background:white;
    color:black;
    padding:12px 25px;
    border-radius:25px;
    text-decoration:none;
    width:fit-content;
}

/* IMAGEN LATERAL */
.side-image {
    position:absolute;
    right:10%;
    top:30%;
}

.side-image img {
    width:250px;
    border-radius:15px;
}

/* WHATS */
.whatsapp {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
}
</style>
</head>

<body>

<nav>
    <a href="#">Inicio</a>
    <a href="#paquetes">Paquetes</a>
    <a href="#contacto">Contacto</a>
</nav>

<section class="hero">
    <h1>EXPLORA<br>CENOTES</h1>
    <p>Vive una experiencia única en los cenotes de Homún, Yucatán.</p>
    <a href="#paquetes" class="btn">Ver Paquetes</a>
</section>

<div class="side-image">
    <img src="cenote3.jpeg">
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/5219990000000" class="whatsapp">💬</a>

</body>
</html>
